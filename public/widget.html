<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Crypto Market Monitor</title>
<style>
  :root {
    color: #0b0b0f;
    font-family: "Inter", system-ui, -apple-system, sans-serif;
  }

  html, body { width: 100%; min-height: 100%; box-sizing: border-box; }
  body { margin: 0; padding: 16px; background: #f6f8fb; }

  .container {
    width: 100%;
    max-width: 720px;
    margin: 0 auto;
    background: #fff;
    border-radius: 16px;
    padding: 20px;
    box-shadow: 0 12px 24px rgba(15, 23, 42, 0.08);
  }

  /* ── Header ── */
  .header {
    margin: 0 0 16px;
  }

  .header h2 {
    margin: 0 0 4px;
    font-size: 1.25rem;
    font-weight: 700;
  }

  .header .subtitle {
    font-size: 0.8rem;
    color: #6c768a;
  }

  /* ── Controls ── */
  .controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: flex-end;
    margin-bottom: 16px;
  }

  .control-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .control-group label {
    font-size: 0.7rem;
    color: #6c768a;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    font-weight: 600;
  }

  select {
    background: #f6f8fb;
    color: #0b0b0f;
    border: 1px solid #cad3e0;
    border-radius: 10px;
    padding: 8px 12px;
    font-size: 0.85rem;
    cursor: pointer;
    min-width: 150px;
  }

  select:focus { outline: none; border-color: #111bf5; }

  .btn-refresh {
    background: #111bf5;
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 8px 18px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }

  .btn-refresh:hover { opacity: 0.9; }
  .btn-refresh:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ── Status ── */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    font-size: 0.75rem;
    color: #6c768a;
  }

  .status-bar .count { color: #111bf5; font-weight: 600; }

  /* ── Loading ── */
  .loading {
    text-align: center;
    padding: 48px 20px;
    color: #6c768a;
  }

  .spinner {
    width: 28px;
    height: 28px;
    border: 3px solid #e2e8f0;
    border-top-color: #111bf5;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 10px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Table ── */
  .table-wrapper {
    overflow-x: auto;
    border-radius: 12px;
    border: 1px solid #e2e8f0;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
  }

  thead th {
    background: #f6f8fb;
    color: #6c768a;
    font-weight: 600;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    padding: 10px 12px;
    text-align: left;
    white-space: nowrap;
    border-bottom: 1px solid #e2e8f0;
    cursor: pointer;
    user-select: none;
    transition: color 0.15s;
  }

  thead th:hover { color: #111bf5; }
  thead th.sorted { color: #111bf5; }
  thead th .arrow { margin-left: 3px; font-size: 0.6rem; }

  tbody tr {
    border-bottom: 1px solid #f0f3f8;
    transition: background 0.1s;
  }

  tbody tr:hover { background: #f6f8fb; }
  tbody tr:last-child { border-bottom: none; }

  td { padding: 9px 12px; white-space: nowrap; }

  /* ── Coin cell ── */
  .coin-cell {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .coin-cell img {
    width: 24px;
    height: 24px;
    border-radius: 50%;
  }

  .coin-name { font-weight: 600; }

  .coin-symbol {
    color: #6c768a;
    font-size: 0.72rem;
    text-transform: uppercase;
  }

  /* ── Values ── */
  .price { font-weight: 600; font-variant-numeric: tabular-nums; }
  .positive { color: #16a34a; }
  .negative { color: #dc2626; }
  .neutral  { color: #6c768a; }
  .muted    { color: #6c768a; font-variant-numeric: tabular-nums; }
  .rank     { color: #94a3b8; font-weight: 700; font-size: 0.78rem; text-align: center; width: 28px; }

  /* ── Error ── */
  .error-state {
    text-align: center;
    padding: 32px 20px;
    color: #dc2626;
  }

  .error-state button {
    margin-top: 10px;
    background: #f6f8fb;
    color: #0b0b0f;
    border: 1px solid #cad3e0;
    border-radius: 10px;
    padding: 8px 16px;
    cursor: pointer;
    font-size: 0.85rem;
  }

  /* ── Responsive ── */
  @media (max-width: 640px) {
    body { padding: 10px; }
    .container { padding: 14px; }
    .controls { gap: 8px; }
    select { min-width: 120px; }
    td, th { padding: 7px 8px; font-size: 0.78rem; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h2>Crypto Market Monitor</h2>
    <div class="subtitle">Real-time data from CoinGecko</div>
  </div>

  <div class="controls">
    <div class="control-group">
      <label>Timeframe</label>
      <select id="timeframe">
        <option value="24h" selected>24 Hours</option>
        <option value="7d">7 Days</option>
      </select>
    </div>
    <div class="control-group">
      <label>Sort By</label>
      <select id="sortBy">
        <option value="market_cap" selected>Market Cap</option>
        <option value="price">Price</option>
        <option value="volume">Volume</option>
        <option value="change_24h">24h Change</option>
      </select>
    </div>
    <button class="btn-refresh" id="refreshBtn" onclick="refreshData()">
      Refresh
    </button>
  </div>

  <div class="status-bar">
    <span id="coinCount"></span>
    <span id="lastUpdated"></span>
  </div>

  <div id="dataContainer">
    <div class="loading">
      <div class="spinner"></div>
      <div>Loading market data…</div>
    </div>
  </div>
</div>

<script type="module">
  // ── State ──
  let cryptoData = [];
  let currentSort = { key: "market_cap", dir: "desc" };

  // ── Read initial data from Athena's widget runtime ──
  if (window.openai?.toolOutput?.coins) {
    cryptoData = window.openai.toolOutput.coins;
  }

  // Restore widget state if available
  if (window.openai?.widgetState) {
    const ws = window.openai.widgetState;
    if (ws.sortKey) currentSort.key = ws.sortKey;
    if (ws.sortDir) currentSort.dir = ws.sortDir;
    if (ws.timeframe) document.getElementById("timeframe").value = ws.timeframe;
    if (ws.sortBy) document.getElementById("sortBy").value = ws.sortBy;
  }

  // ── Formatting ──
  function fmtPrice(n) {
    if (n == null) return "—";
    if (n >= 1) return "$" + n.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    return "$" + n.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 6 });
  }

  function fmtCompact(n) {
    if (n == null) return "—";
    if (n >= 1e12) return "$" + (n / 1e12).toFixed(2) + "T";
    if (n >= 1e9)  return "$" + (n / 1e9).toFixed(2) + "B";
    if (n >= 1e6)  return "$" + (n / 1e6).toFixed(2) + "M";
    return "$" + n.toLocaleString("en-US");
  }

  function fmtPct(n) {
    if (n == null) return "—";
    return (n >= 0 ? "+" : "") + n.toFixed(2) + "%";
  }

  function pctClass(n) {
    if (n == null) return "neutral";
    return n >= 0 ? "positive" : "negative";
  }

  // ── Sorting ──
  function sortData(data, key, dir) {
    const fieldMap = {
      market_cap: "market_cap",
      price: "current_price",
      current_price: "current_price",
      volume: "total_volume",
      total_volume: "total_volume",
      change_24h: "price_change_percentage_24h",
      price_change_percentage_24h: "price_change_percentage_24h",
      name: "name",
    };
    const field = fieldMap[key] || key;
    return [...data].sort((a, b) => {
      const va = a[field] ?? 0;
      const vb = b[field] ?? 0;
      if (typeof va === "string") return dir === "desc" ? vb.localeCompare(va) : va.localeCompare(vb);
      return dir === "desc" ? vb - va : va - vb;
    });
  }

  // ── Save widget state ──
  function saveState() {
    if (window.openai?.setWidgetState) {
      window.openai.setWidgetState({
        sortKey: currentSort.key,
        sortDir: currentSort.dir,
        timeframe: document.getElementById("timeframe").value,
        sortBy: document.getElementById("sortBy").value,
      });
    }
  }

  // ── Render ──
  function renderTable(data) {
    const timeframe = document.getElementById("timeframe").value;
    const changeLabel = timeframe === "7d" ? "7d Change" : "24h Change";
    const changeField = timeframe === "7d" ? "price_change_percentage_7d" : "price_change_percentage_24h";

    const arrow = (key) => currentSort.key !== key ? "" : `<span class="arrow">${currentSort.dir === "desc" ? "▼" : "▲"}</span>`;
    const sc = (key) => currentSort.key === key ? "sorted" : "";

    let html = `<div class="table-wrapper"><table>
      <thead><tr>
        <th>#</th>
        <th class="${sc("name")}" data-sort="name">Coin${arrow("name")}</th>
        <th class="${sc("current_price")}" data-sort="current_price">Price (USD)${arrow("current_price")}</th>
        <th class="${sc("price_change_percentage_24h")}" data-sort="price_change_percentage_24h">${changeLabel}${arrow("price_change_percentage_24h")}</th>
        <th class="${sc("market_cap")}" data-sort="market_cap">Market Cap${arrow("market_cap")}</th>
        <th class="${sc("total_volume")}" data-sort="total_volume">Volume${arrow("total_volume")}</th>
      </tr></thead><tbody>`;

    data.forEach((coin, i) => {
      const cv = coin[changeField];
      html += `<tr>
        <td class="rank">${i + 1}</td>
        <td><div class="coin-cell">
          <img src="${coin.image}" alt="${coin.name}" loading="lazy" onerror="this.style.display='none'" />
          <span class="coin-name">${coin.name}</span>
          <span class="coin-symbol">${coin.symbol}</span>
        </div></td>
        <td class="price">${fmtPrice(coin.current_price)}</td>
        <td class="${pctClass(cv)}">${fmtPct(cv)}</td>
        <td class="muted">${fmtCompact(coin.market_cap)}</td>
        <td class="muted">${fmtCompact(coin.total_volume)}</td>
      </tr>`;
    });

    html += "</tbody></table></div>";
    return html;
  }

  function updateUI(data) {
    const sorted = sortData(data, currentSort.key, currentSort.dir);
    document.getElementById("dataContainer").innerHTML = renderTable(sorted);
    document.getElementById("coinCount").innerHTML = `<span class="count">${data.length}</span> coins`;
    document.getElementById("lastUpdated").textContent = "Updated: " + new Date().toLocaleTimeString();

    // Attach column sort listeners
    document.querySelectorAll("thead th[data-sort]").forEach((th) => {
      th.addEventListener("click", () => handleSort(th.dataset.sort));
    });
  }

  // ── Column sort ──
  window.handleSort = function (key) {
    if (currentSort.key === key) {
      currentSort.dir = currentSort.dir === "desc" ? "asc" : "desc";
    } else {
      currentSort.key = key;
      currentSort.dir = "desc";
    }

    const dropdownMap = { market_cap: "market_cap", current_price: "price", total_volume: "volume", price_change_percentage_24h: "change_24h" };
    if (dropdownMap[key]) document.getElementById("sortBy").value = dropdownMap[key];

    updateUI(cryptoData);
    saveState();
  };

  // ── Fetch via MCP callTool or direct fallback ──
  async function fetchData() {
    const sortBy = document.getElementById("sortBy").value;
    const orderMap = { market_cap: "market_cap_desc", price: "market_cap_desc", volume: "volume_desc", change_24h: "market_cap_desc" };

    const params = {
      vs_currency: "usd",
      order: orderMap[sortBy] || "market_cap_desc",
      per_page: 20,
    };

    // Try Athena MCP bridge
    if (window.openai?.callTool) {
      try {
        const response = await window.openai.callTool("get_crypto_prices", params);
        if (response?.structuredContent?.coins) return response.structuredContent.coins;
      } catch (e) {
        console.warn("callTool failed, using direct fetch:", e);
      }
    }

    // Fallback: direct CoinGecko call
    const qs = new URLSearchParams({
      vs_currency: "usd",
      order: orderMap[sortBy] || "market_cap_desc",
      per_page: "20",
      page: "1",
      sparkline: "false",
      price_change_percentage: "24h,7d",
    });
    const res = await fetch(`https://api.coingecko.com/api/v3/coins/markets?${qs}`);
    if (!res.ok) throw new Error("API error: " + res.status);
    const raw = await res.json();
    return raw.map((c) => ({
      id: c.id, name: c.name, symbol: c.symbol,
      current_price: c.current_price, market_cap: c.market_cap,
      total_volume: c.total_volume,
      price_change_percentage_24h: c.price_change_percentage_24h,
      price_change_percentage_7d: c.price_change_percentage_7d_in_currency ?? null,
      image: c.image,
    }));
  }

  // ── Refresh ──
  window.refreshData = async function () {
    const btn = document.getElementById("refreshBtn");
    const container = document.getElementById("dataContainer");
    btn.disabled = true;
    btn.textContent = "Loading…";
    container.innerHTML = `<div class="loading"><div class="spinner"></div><div>Fetching market data…</div></div>`;

    try {
      cryptoData = await fetchData();

      const sortBy = document.getElementById("sortBy").value;
      const fieldMap = { market_cap: "market_cap", price: "current_price", volume: "total_volume", change_24h: "price_change_percentage_24h" };
      currentSort.key = fieldMap[sortBy] || "market_cap";

      updateUI(cryptoData);
      saveState();
    } catch (err) {
      container.innerHTML = `<div class="error-state">
        <div>Failed to load market data</div>
        <div style="font-size:0.78rem;margin-top:4px;color:#6c768a">${err.message}</div>
        <button onclick="refreshData()">Try Again</button>
      </div>`;
    } finally {
      btn.disabled = false;
      btn.textContent = "Refresh";
    }
  };

  // ── Listen for Athena state updates ──
  window.addEventListener("openai:set_globals", (event) => {
    const globals = event.detail?.globals;
    if (globals?.toolOutput?.coins) {
      cryptoData = globals.toolOutput.coins;
      updateUI(cryptoData);
    }
  }, { passive: true });

  // ── Control listeners ──
  document.getElementById("timeframe").addEventListener("change", () => {
    updateUI(cryptoData);
    saveState();
  });

  document.getElementById("sortBy").addEventListener("change", () => {
    const sortBy = document.getElementById("sortBy").value;
    const fieldMap = { market_cap: "market_cap", price: "current_price", volume: "total_volume", change_24h: "price_change_percentage_24h" };
    currentSort.key = fieldMap[sortBy] || "market_cap";
    currentSort.dir = "desc";
    updateUI(cryptoData);
    saveState();
  });

  // ── Initial render ──
  if (cryptoData.length > 0) {
    updateUI(cryptoData);
  } else {
    refreshData();
  }
</script>
</body>
</html>
