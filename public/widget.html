<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Crypto Market Monitor</title>
<style>
  /* ── Reset & Base ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
    background: #0d1117;
    color: #e6edf3;
    min-height: 100vh;
    padding: 20px;
  }

  /* ── Container ── */
  .container {
    max-width: 960px;
    margin: 0 auto;
  }

  /* ── Header ── */
  .header {
    text-align: center;
    margin-bottom: 24px;
  }

  .header h1 {
    font-size: 1.6rem;
    font-weight: 700;
    background: linear-gradient(135deg, #58a6ff, #bc8cff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 4px;
  }

  .header .subtitle {
    font-size: 0.82rem;
    color: #8b949e;
  }

  /* ── Controls Panel ── */
  .controls {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
    padding: 16px;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 12px;
  }

  .control-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .control-group label {
    font-size: 0.7rem;
    color: #8b949e;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 600;
  }

  select {
    background: #0d1117;
    color: #e6edf3;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 0.85rem;
    cursor: pointer;
    min-width: 160px;
    transition: border-color 0.2s;
  }

  select:hover { border-color: #58a6ff; }
  select:focus { outline: none; border-color: #58a6ff; box-shadow: 0 0 0 2px rgba(88,166,255,0.15); }

  .btn-refresh {
    background: linear-gradient(135deg, #238636, #2ea043);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 8px 20px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    align-self: flex-end;
    white-space: nowrap;
  }

  .btn-refresh:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(35,134,54,0.3); }
  .btn-refresh:active { transform: translateY(0); }
  .btn-refresh:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* ── Status bar ── */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    font-size: 0.75rem;
    color: #8b949e;
    padding: 0 4px;
  }

  .status-bar .count { color: #58a6ff; font-weight: 600; }

  /* ── Loading spinner ── */
  .loading {
    text-align: center;
    padding: 60px 20px;
    color: #8b949e;
  }

  .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid #30363d;
    border-top-color: #58a6ff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Table ── */
  .table-wrapper {
    overflow-x: auto;
    border: 1px solid #30363d;
    border-radius: 12px;
    background: #161b22;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
  }

  thead th {
    background: #1c2128;
    color: #8b949e;
    font-weight: 600;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 12px 14px;
    text-align: left;
    white-space: nowrap;
    border-bottom: 1px solid #30363d;
    cursor: pointer;
    user-select: none;
    transition: color 0.2s;
  }

  thead th:hover { color: #58a6ff; }
  thead th.sorted { color: #58a6ff; }
  thead th .arrow { margin-left: 4px; font-size: 0.65rem; }

  tbody tr {
    border-bottom: 1px solid #21262d;
    transition: background 0.15s;
  }

  tbody tr:hover { background: #1c2128; }
  tbody tr:last-child { border-bottom: none; }

  td {
    padding: 10px 14px;
    white-space: nowrap;
  }

  /* Coin cell */
  .coin-cell {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .coin-cell img {
    width: 26px;
    height: 26px;
    border-radius: 50%;
  }

  .coin-name {
    font-weight: 600;
    color: #e6edf3;
  }

  .coin-symbol {
    color: #8b949e;
    font-size: 0.75rem;
    text-transform: uppercase;
    margin-left: 2px;
  }

  /* Numbers */
  .price { font-weight: 600; font-variant-numeric: tabular-nums; }
  .positive { color: #3fb950; }
  .negative { color: #f85149; }
  .neutral  { color: #8b949e; }
  .muted    { color: #8b949e; font-variant-numeric: tabular-nums; }

  /* Rank */
  .rank {
    color: #484f58;
    font-weight: 700;
    font-size: 0.8rem;
    width: 28px;
    text-align: center;
  }

  /* ── Error state ── */
  .error-state {
    text-align: center;
    padding: 40px 20px;
    color: #f85149;
  }

  .error-state button {
    margin-top: 12px;
    background: #21262d;
    color: #e6edf3;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 8px 16px;
    cursor: pointer;
  }

  /* ── Responsive ── */
  @media (max-width: 640px) {
    body { padding: 12px; }
    .controls { gap: 8px; }
    select { min-width: 130px; }
    td, th { padding: 8px 10px; font-size: 0.8rem; }
  }
</style>
</head>
<body>
<div class="container">
  <!-- Header -->
  <div class="header">
    <h1>Crypto Market Monitor</h1>
    <div class="subtitle">Real-time cryptocurrency data powered by CoinGecko</div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <div class="control-group">
      <label>Timeframe</label>
      <select id="timeframe">
        <option value="24h" selected>24 Hours</option>
        <option value="7d">7 Days</option>
        <option value="all">All Time</option>
      </select>
    </div>
    <div class="control-group">
      <label>Sort By</label>
      <select id="sortBy">
        <option value="market_cap" selected>Market Cap</option>
        <option value="price">Price</option>
        <option value="volume">Volume</option>
        <option value="change_24h">24h Change</option>
      </select>
    </div>
    <button class="btn-refresh" id="refreshBtn" onclick="refreshData()">
      Refresh Data
    </button>
  </div>

  <!-- Status Bar -->
  <div class="status-bar">
    <span id="coinCount"></span>
    <span id="lastUpdated"></span>
  </div>

  <!-- Data Container -->
  <div id="dataContainer">
    <div class="loading">
      <div class="spinner"></div>
      <div>Loading market data...</div>
    </div>
  </div>
</div>

<script>
// ── State ──
let cryptoData = [];
let currentSort = { key: "market_cap", dir: "desc" };

// ── Formatting helpers ──
function fmtPrice(n) {
  if (n == null) return "—";
  if (n >= 1) return "$" + n.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  return "$" + n.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 6 });
}

function fmtCompact(n) {
  if (n == null) return "—";
  if (n >= 1e12) return "$" + (n / 1e12).toFixed(2) + "T";
  if (n >= 1e9)  return "$" + (n / 1e9).toFixed(2) + "B";
  if (n >= 1e6)  return "$" + (n / 1e6).toFixed(2) + "M";
  return "$" + n.toLocaleString("en-US");
}

function fmtPct(n) {
  if (n == null) return "—";
  const sign = n >= 0 ? "+" : "";
  return sign + n.toFixed(2) + "%";
}

function pctClass(n) {
  if (n == null) return "neutral";
  return n >= 0 ? "positive" : "negative";
}

// ── Fetch data via MCP tool or direct API ──
async function fetchData() {
  const timeframe = document.getElementById("timeframe").value;
  const sortBy = document.getElementById("sortBy").value;

  // Map sort selection to CoinGecko order parameter
  const orderMap = {
    market_cap: "market_cap_desc",
    price: "market_cap_desc",  // CoinGecko doesn't support price sort, we sort client-side
    volume: "volume_desc",
    change_24h: "market_cap_desc", // Sort client-side
  };

  const toolParams = {
    vs_currency: "usd",
    order: orderMap[sortBy] || "market_cap_desc",
    per_page: 20,
  };

  let data;

  // Try MCP tool call (Athena integration)
  if (window.openai && window.openai.callTool) {
    try {
      const result = await window.openai.callTool("get_crypto_prices", toolParams);
      data = typeof result === "string" ? JSON.parse(result) : result;
      if (data.result) data = data.result;
    } catch (e) {
      console.warn("MCP callTool failed, falling back to direct fetch:", e);
    }
  }

  // Fallback: direct API call
  if (!data) {
    try {
      const resp = await fetch("https://api.coingecko.com/api/v3/coins/markets?" + new URLSearchParams({
        vs_currency: "usd",
        order: orderMap[sortBy] || "market_cap_desc",
        per_page: "20",
        page: "1",
        sparkline: "false",
        price_change_percentage: "24h,7d"
      }));
      if (!resp.ok) throw new Error("API returned " + resp.status);
      const raw = await resp.json();
      data = raw.map(c => ({
        id: c.id,
        name: c.name,
        symbol: c.symbol,
        current_price: c.current_price,
        market_cap: c.market_cap,
        total_volume: c.total_volume,
        price_change_percentage_24h: c.price_change_percentage_24h,
        price_change_percentage_7d: c.price_change_percentage_7d_in_currency ?? null,
        image: c.image,
      }));
    } catch (e) {
      console.error("Direct API fetch failed:", e);
      throw e;
    }
  }

  return data;
}

// ── Sort data client-side ──
function sortData(data, key, dir) {
  const keyMap = {
    market_cap: "market_cap",
    price: "current_price",
    volume: "total_volume",
    change_24h: "price_change_percentage_24h",
    current_price: "current_price",
    total_volume: "total_volume",
    price_change_percentage_24h: "price_change_percentage_24h",
  };
  const field = keyMap[key] || key;
  return [...data].sort((a, b) => {
    const va = a[field] ?? 0;
    const vb = b[field] ?? 0;
    return dir === "desc" ? vb - va : va - vb;
  });
}

// ── Render table ──
function renderTable(data) {
  const timeframe = document.getElementById("timeframe").value;
  const changeLabel = timeframe === "7d" ? "7d Change" : "24h Change";
  const changeField = timeframe === "7d" ? "price_change_percentage_7d" : "price_change_percentage_24h";

  const sortArrow = (key) => {
    if (currentSort.key !== key) return "";
    return `<span class="arrow">${currentSort.dir === "desc" ? "▼" : "▲"}</span>`;
  };

  const sortedClass = (key) => currentSort.key === key ? "sorted" : "";

  let html = `
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th class="${sortedClass("name")}" onclick="handleSort('name')">Coin${sortArrow("name")}</th>
            <th class="${sortedClass("current_price")}" onclick="handleSort('current_price')">Price (USD)${sortArrow("current_price")}</th>
            <th class="${sortedClass("price_change_percentage_24h")}" onclick="handleSort('price_change_percentage_24h')">${changeLabel}${sortArrow("price_change_percentage_24h")}</th>
            <th class="${sortedClass("market_cap")}" onclick="handleSort('market_cap')">Market Cap${sortArrow("market_cap")}</th>
            <th class="${sortedClass("total_volume")}" onclick="handleSort('total_volume')">Volume${sortArrow("total_volume")}</th>
          </tr>
        </thead>
        <tbody>`;

  data.forEach((coin, i) => {
    const changeVal = coin[changeField];
    html += `
          <tr>
            <td class="rank">${i + 1}</td>
            <td>
              <div class="coin-cell">
                <img src="${coin.image}" alt="${coin.name}" loading="lazy" onerror="this.style.display='none'" />
                <span class="coin-name">${coin.name}</span>
                <span class="coin-symbol">${coin.symbol}</span>
              </div>
            </td>
            <td class="price">${fmtPrice(coin.current_price)}</td>
            <td class="${pctClass(changeVal)}">${fmtPct(changeVal)}</td>
            <td class="muted">${fmtCompact(coin.market_cap)}</td>
            <td class="muted">${fmtCompact(coin.total_volume)}</td>
          </tr>`;
  });

  html += `</tbody></table></div>`;
  return html;
}

// ── Handle column header sort click ──
function handleSort(key) {
  if (currentSort.key === key) {
    currentSort.dir = currentSort.dir === "desc" ? "asc" : "desc";
  } else {
    currentSort.key = key;
    currentSort.dir = "desc";
  }

  // Update sort dropdown to match
  const dropdownMap = {
    market_cap: "market_cap",
    current_price: "price",
    total_volume: "volume",
    price_change_percentage_24h: "change_24h",
  };
  if (dropdownMap[key]) {
    document.getElementById("sortBy").value = dropdownMap[key];
  }

  const sorted = sortData(cryptoData, currentSort.key, currentSort.dir);
  document.getElementById("dataContainer").innerHTML = renderTable(sorted);
}

// ── Refresh data ──
async function refreshData() {
  const btn = document.getElementById("refreshBtn");
  const container = document.getElementById("dataContainer");

  btn.disabled = true;
  btn.textContent = "Loading...";

  container.innerHTML = `<div class="loading"><div class="spinner"></div><div>Fetching market data...</div></div>`;

  try {
    cryptoData = await fetchData();

    // Map dropdown sort key to data field
    const sortBy = document.getElementById("sortBy").value;
    const fieldMap = {
      market_cap: "market_cap",
      price: "current_price",
      volume: "total_volume",
      change_24h: "price_change_percentage_24h",
    };
    currentSort.key = fieldMap[sortBy] || "market_cap";

    const sorted = sortData(cryptoData, currentSort.key, currentSort.dir);
    container.innerHTML = renderTable(sorted);

    document.getElementById("coinCount").innerHTML = `<span class="count">${cryptoData.length}</span> coins loaded`;
    document.getElementById("lastUpdated").textContent = "Updated: " + new Date().toLocaleTimeString();
  } catch (err) {
    container.innerHTML = `
      <div class="error-state">
        <div>Failed to load market data</div>
        <div style="font-size:0.8rem;margin-top:4px;color:#8b949e">${err.message}</div>
        <button onclick="refreshData()">Try Again</button>
      </div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = "Refresh Data";
  }
}

// ── Event listeners for controls ──
document.getElementById("timeframe").addEventListener("change", refreshData);
document.getElementById("sortBy").addEventListener("change", () => {
  const sortBy = document.getElementById("sortBy").value;
  const fieldMap = {
    market_cap: "market_cap",
    price: "current_price",
    volume: "total_volume",
    change_24h: "price_change_percentage_24h",
  };
  currentSort.key = fieldMap[sortBy] || "market_cap";
  currentSort.dir = "desc";

  if (cryptoData.length > 0) {
    const sorted = sortData(cryptoData, currentSort.key, currentSort.dir);
    document.getElementById("dataContainer").innerHTML = renderTable(sorted);
  }
});

// ── Initial load ──
refreshData();
</script>
</body>
</html>
